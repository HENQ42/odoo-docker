upstream odoo {
    server 127.0.0.1:8069;
}

upstream odoochat {
    server 127.0.0.1:8072;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name odoo-sefaz-al.brisanet.net.br;

    access_log /var/log/nginx/odoo-sefaz-al.access.log;
    error_log  /var/log/nginx/odoo-sefaz-al.error.log;

    client_max_body_size 200M;
    client_body_buffer_size 128k;

    proxy_read_timeout    720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout    720s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    gzip on;
    gzip_min_length 1100;
    gzip_buffers 4 32k;
    gzip_types text/css text/scss text/plain text/xml application/xml application/json application/javascript application/pdf image/jpeg image/png;
    gzip_vary on;

    # Bloqueia gerenciador de banco a partir de fora (defesa em profundidade;
    # list_db=False no Odoo já protege, mas reforça)
    location ^~ /web/database/manager {
        return 404;
    }
    location ^~ /web/database/selector {
        return 404;
    }

    # Redirect longpolling legacy (Odoo < 16) para websocket
    location /longpolling/ {
        proxy_pass http://odoochat;
    }

    # Websocket (Odoo 16+)
    location /websocket {
        proxy_pass http://odoochat;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Cache de assets estáticos
    location ~* /web/static/ {
        proxy_cache_valid 200 60m;
        proxy_buffering on;
        expires 864000;
        proxy_pass http://odoo;
    }

    # Tudo o mais vai pro Odoo
    location / {
        proxy_redirect off;
        proxy_pass http://odoo;
    }
}
